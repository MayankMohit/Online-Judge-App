services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"    # HTTP
      - "443:443"  # HTTPS
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro  # for SSL certs
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mern-net
    env_file:
      - ./frontend/.env

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      # Enables background judging via BullMQ. Remove to fall back to synchronous judging.
      - REDIS_URL=redis://redis:6379
    depends_on:
      - compiler-service
      - redis
    restart: unless-stopped
    networks:
      - mern-net

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - mern-net

  compiler-service:
    build:
      context: ./compiler-service
      dockerfile: Dockerfile
    container_name: compiler-service
    env_file:
      - ./compiler-service/.env
    restart: unless-stopped
    networks:
      - mern-net

networks:
  mern-net:
    driver: bridge

volumes:
  redis-data:
