worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name cj.bymayank.com;
	    return 301 https://$host$request_uri;
    }
	
    server {
	    listen 443 ssl;
        server_name cj.bymayank.com;

        ssl_certificate /etc/letsencrypt/live/cj.bymayank.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cj.bymayank.com/privkey.pem;

        # Security headers. `always` so they're sent on error responses too. These
        # apply to both locations below since neither redefines add_header.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Minimal CSP: block framing only (full resource CSP needs app-specific tuning).
        add_header Content-Security-Policy "frame-ancestors 'none'" always;

	    location /api/ {
            proxy_pass http://backend:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            # Forward the real client IP so per-IP rate limiting works (backend sets
            # `trust proxy`). Without this every request looks like it came from nginx.
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
}
